spring.application.name=shooter-server
spring.config.import=optional:file:./application-local.properties
server.port=${PORT:8080}

# Supabase PostgreSQL
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:8}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:15000}

# Controlled schema migrations
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-migration-naming=true

deadzone.jwt.secret=${JWT_SECRET}
deadzone.google.client-id=${GOOGLE_CLIENT_ID:}
deadzone.app.base-url=${APP_BASE_URL:http://localhost:5173}
deadzone.email.from=${MAIL_FROM:${SMTP_USERNAME:}}
deadzone.email.console-fallback=${EMAIL_CONSOLE_FALLBACK:false}
deadzone.email.resend-api-key=${RESEND_API_KEY:}
deadzone.supabase.url=${SUPABASE_URL}
deadzone.supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY}
deadzone.supabase.secret-key=${SUPABASE_SECRET_KEY}
deadzone.supabase.jwks-url=${SUPABASE_JWKS_URL}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:${MAIL_FROM:}}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:20000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:20000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:20000}

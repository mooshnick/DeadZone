spring.application.name=shooter-server
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/deadzone_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
deadzone.jwt.secret=${JWT_SECRET:deadzone-development-secret-change-before-production}
